services:
  - type: web
    name: doctor-meds-backend
    env: node
    repo: https://github.com/aditya-1739/Doctor-Meds
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /api/health
    region: oregon

staticSites:
  - name: doctor-meds-frontend
    repo: https://github.com/aditya-1739/Doctor-Meds
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    region: oregon
